services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: aims
      POSTGRES_PASSWORD: aims
      POSTGRES_DB: aims
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgres://aims:aims@postgres:5432/aims
      PORT: 8080
    depends_on:
      - postgres
    ports:
      - "8080:8080"

  gateway:
    build: ./gateway
    environment:
      TCP_PORT: 9000
      BACKEND_URL: http://backend:8080
    depends_on:
      - backend
    ports:
      - "9000:9000"

volumes:
  pgdata: