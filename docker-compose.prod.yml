services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  backend:
    build: ./backend
    environment:
      NODE_ENV: ${NODE_ENV}
      DATABASE_URL: postgres://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/${DB_NAME}
      PORT: ${BACKEND_PORT}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"

  gateway:
    build: ./gateway
    environment:
      NODE_ENV: ${NODE_ENV}
      TCP_PORT: ${TCP_PORT}
      BACKEND_URL: ${BACKEND_URL}
    depends_on:
      - backend
    ports:
      - "${TCP_PORT}:${TCP_PORT}"

volumes:
  pgdata: