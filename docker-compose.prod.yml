services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    image: ghcr.io/karko-aims/aims-e2e-hello-backend:${IMAGE_TAG}
    environment:
      NODE_ENV: ${NODE_ENV}
      DATABASE_URL: postgres://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/${DB_NAME}
      PORT: ${BACKEND_PORT}
    depends_on:
      - postgres
    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"
    restart: unless-stopped

  gateway:
    image: ghcr.io/karko-aims/aims-e2e-hello-gateway:${IMAGE_TAG}
    environment:
      NODE_ENV: ${NODE_ENV}
      TCP_PORT: ${TCP_PORT}
      BACKEND_URL: ${BACKEND_URL}
    depends_on:
      - backend
    ports:
      - "${TCP_PORT}:${TCP_PORT}"
    restart: unless-stopped

volumes:
  pgdata: