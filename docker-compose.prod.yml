services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    image: ghcr.io/karko-aims/aims-e2e-hello-backend:${IMAGE_TAG}
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      PORT: 8080
    depends_on:
      - postgres
    ports:
      - "8080:8080"
    restart: unless-stopped

  gateway:
    image: ghcr.io/karko-aims/aims-e2e-hello-gateway:${IMAGE_TAG}
    environment:
      TCP_PORT: 9000
      BACKEND_URL: http://backend:8080
    depends_on:
      - backend
    ports:
      - "9000:9000"
    restart: unless-stopped

volumes:
  pgdata: