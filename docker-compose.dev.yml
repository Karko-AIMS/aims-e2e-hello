services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    environment:
      NODE_ENV: ${NODE_ENV}
      DATABASE_URL: postgres://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/${DB_NAME}
      PORT: ${BACKEND_PORT}
    depends_on:
      - postgres
    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"

  gateway:
    build: ./gateway
    environment:
      NODE_ENV: ${NODE_ENV}
      TCP_PORT: ${TCP_PORT}
      BACKEND_URL: ${BACKEND_URL}
    depends_on:
      - backend
    ports:
      - "${TCP_PORT}:${TCP_PORT}"

volumes:
  pgdata: