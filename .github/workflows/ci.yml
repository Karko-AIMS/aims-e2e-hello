name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  gateway-unit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install gateway dependencies
        working-directory: gateway
        run: npm ci

      - name: Run gateway unit tests
        working-directory: gateway
        run: npm run test:unit

  backend-unit:
    runs-on: ubuntu-latest
    needs: gateway-unit

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Run backend unit tests
        working-directory: backend
        run: npm run test:unit

  backend-integration:
    runs-on: ubuntu-latest
    needs: backend-unit

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Prepare CI env file
        run: |
          cat > .env <<'EOF'
          NODE_ENV=test
          DB_HOST=postgres
          DB_PORT=5432
          DB_NAME=aims
          DB_USER=aims
          DB_PASSWORD=aims
          BACKEND_PORT=8080
          BACKEND_URL=http://backend:8080
          TCP_PORT=9000
          IMAGE_TAG=ci
          EOF

      - name: Start postgres for integration test
        run: docker compose -f docker-compose.dev.yml up -d postgres

      - name: Wait for postgres health
        run: |
          for i in {1..30}; do
            if docker compose -f docker-compose.dev.yml exec -T postgres \
              pg_isready -U aims -d aims >/dev/null 2>&1; then
              echo "Postgres is ready"
              exit 0
            fi
            echo "Waiting for postgres..."
            sleep 2
          done
          echo "Postgres did not become ready in time"
          docker compose -f docker-compose.dev.yml logs
          exit 1

      - name: Run backend integration tests
        working-directory: backend
        run: DATABASE_URL=postgres://aims:aims@127.0.0.1:5432/aims npm run test:int

      - name: Show service logs on failure
        if: failure()
        run: docker compose -f docker-compose.dev.yml logs || true

      - name: Tear down integration stack
        if: always()
        run: docker compose -f docker-compose.dev.yml down -v

  hello-e2e:
    runs-on: ubuntu-latest
    needs: backend-integration

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install gateway dependencies
        working-directory: gateway
        run: npm ci

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Prepare CI env file
        run: |
          cat > .env <<'EOF'
          NODE_ENV=test
          DB_HOST=postgres
          DB_PORT=5432
          DB_NAME=aims
          DB_USER=aims
          DB_PASSWORD=aims
          BACKEND_PORT=8080
          BACKEND_URL=http://backend:8080
          TCP_PORT=9000
          IMAGE_TAG=ci
          EOF

      - name: Build images
        run: docker compose -f docker-compose.dev.yml build

      - name: Start services
        run: docker compose -f docker-compose.dev.yml up -d

      - name: Wait for backend health
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8080/health; then
              echo "Backend is ready"
              exit 0
            fi
            echo "Waiting for backend..."
            sleep 2
          done
          echo "Backend did not become ready in time"
          docker compose -f docker-compose.dev.yml logs
          exit 1

      - name: Send HELLO over TCP
        run: |
          node - <<'EOF'
          const net = require("net");

          const msg =
            JSON.stringify({
              type: "HELLO",
              vehicle_id: "CI-001",
              firmware_version: "ci-test",
              timestamp: "2026-03-09T12:00:00+09:00"
            }) + "\n";

          const client = net.createConnection({ host: "127.0.0.1", port: 9000 }, () => {
            client.write(msg);
            client.end();
          });

          client.on("error", (err) => {
            console.error("TCP send failed:", err);
            process.exit(1);
          });
          EOF

      - name: Wait for DB insert
        run: |
          for i in {1..20}; do
            COUNT=$(docker compose -f docker-compose.dev.yml exec -T postgres \
              psql -U aims -d aims -t -A \
              -c "select count(*) from hello_messages where vehicle_id='CI-001';")
            if [ "$COUNT" = "1" ]; then
              echo "HELLO row inserted"
              exit 0
            fi
            echo "Waiting for DB insert..."
            sleep 2
          done

          echo "HELLO row was not inserted"
          docker compose -f docker-compose.dev.yml logs
          exit 1

      - name: Show inserted rows
        if: always()
        run: |
          docker compose -f docker-compose.dev.yml exec -T postgres \
            psql -U aims -d aims \
            -c "select id, vehicle_id, firmware_version, ts, created_at from hello_messages order by id desc limit 10;" || true

      - name: Show service logs on failure
        if: failure()
        run: docker compose -f docker-compose.dev.yml logs || true

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.dev.yml down -v
